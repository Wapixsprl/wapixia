name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/wapixia

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app:
          - name: api
            dockerfile: ./Dockerfile
            context: .
          - name: web
            dockerfile: ./apps/web/Dockerfile
            context: .
          - name: dashboard
            dockerfile: ./apps/dashboard/Dockerfile
            context: .
          - name: admin
            dockerfile: ./apps/admin/Dockerfile
            context: .
          - name: reseller
            dockerfile: ./apps/reseller/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.app.context }}
          file: ${{ matrix.app.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.app.name }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.app.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via Coolify
        run: |
          curl -X POST "${{ secrets.PROD_COOLIFY_URL }}/api/v1/applications/${{ secrets.PROD_APP_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.PROD_COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error

      - name: Wait for deployment
        run: sleep 30

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: deploy
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run migrations via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: deploy
          key: ${{ secrets.PROD_VPS_SSH_KEY }}
          script: |
            cd /opt/wapixia
            docker compose exec -T api pnpm db:migrate

  health-checks:
    name: Post-Deploy Health Checks
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Health check — api.wapixia.com
        run: |
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w '%{http_code}' https://api.wapixia.com/health)
            if [ "$status" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$status, retrying..."
            sleep 5
          done
          echo "API health check failed"
          exit 1

      - name: Health check — app.wapixia.com
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://app.wapixia.com)
          if [ "$status" != "200" ] && [ "$status" != "302" ]; then
            echo "Dashboard health check failed: $status"
            exit 1
          fi
          echo "Dashboard health check passed"

      - name: Health check — admin.wapixia.com
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://admin.wapixia.com)
          if [ "$status" != "200" ] && [ "$status" != "302" ]; then
            echo "Admin health check failed: $status"
            exit 1
          fi
          echo "Admin health check passed"

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: health-checks
    if: always()

    steps:
      - name: Notify deployment result
        run: |
          if [ "${{ needs.health-checks.result }}" = "success" ]; then
            echo "Production deployment succeeded for commit ${{ github.sha }}"
          else
            echo "Production deployment FAILED for commit ${{ github.sha }}"
            exit 1
          fi
