name: Deploy to Staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/wapixia

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app:
          - name: api
            dockerfile: ./Dockerfile
            context: .
          - name: web
            dockerfile: ./apps/web/Dockerfile
            context: .
          - name: dashboard
            dockerfile: ./apps/dashboard/Dockerfile
            context: .
          - name: admin
            dockerfile: ./apps/admin/Dockerfile
            context: .
          - name: reseller
            dockerfile: ./apps/reseller/Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.app.context }}
          file: ${{ matrix.app.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.app.name }}:staging
            ${{ env.IMAGE_PREFIX }}-${{ matrix.app.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via Coolify
        run: |
          curl -X POST "${{ secrets.COOLIFY_URL }}/api/v1/applications/${{ secrets.STAGING_APP_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error

      - name: Wait for deployment
        run: sleep 30

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run migrations via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/wapixia
            docker compose exec -T api pnpm db:migrate

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Health check — API
        run: |
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w '%{http_code}' https://staging-api.wapixia.com/health)
            if [ "$status" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$status, retrying..."
            sleep 5
          done
          echo "API health check failed"
          exit 1

      - name: Health check — Dashboard
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://staging-app.wapixia.com)
          if [ "$status" != "200" ] && [ "$status" != "302" ]; then
            echo "Dashboard health check failed: $status"
            exit 1
          fi
          echo "Dashboard health check passed"

      - name: Health check — Web
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://staging.wapixia.com)
          if [ "$status" != "200" ]; then
            echo "Web health check failed: $status"
            exit 1
          fi
          echo "Web health check passed"
