# @wapixia/infra — Crontab entries for automated database maintenance
#
# Install with: crontab /path/to/crontab.conf
# Or append with: crontab -l | cat - /path/to/crontab.conf | crontab -
#
# Logs are redirected to /var/log/wapixia/ — ensure directory exists:
#   sudo mkdir -p /var/log/wapixia && sudo chown $(whoami) /var/log/wapixia

# ── Daily PostgreSQL backup at 02:00 UTC ──
0 2 * * * /opt/wapixia/infra/scripts/backup.sh >> /var/log/wapixia/backup.log 2>&1

# ── Monthly restore verification on the 1st at 04:00 UTC ──
0 4 1 * * /opt/wapixia/infra/scripts/restore-test.sh >> /var/log/wapixia/restore-test.log 2>&1
